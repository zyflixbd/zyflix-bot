name: ZyFlix Daily Movie Post

on:
  # ─── BD Time → UTC (BD = UTC + 6) ──────────────────────
  # Bollywood  → BD সকাল ১১:০৫  = UTC 05:05  → '5 5 * * *'
  # Hollywood  → BD সন্ধ্যা ৬:৩০ = UTC 12:30  → '30 12 * * *'
  # ──────────────────────────────────────────────────────────
  schedule:
    - cron: '5 5 * * *'      # Bollywood  (BD 11:05 AM)
    - cron: '30 12 * * *'    # Hollywood  (BD  6:30 PM)

  workflow_dispatch:
    inputs:
      session:
        description: 'Which session to run?'
        required: true
        default: 'both'
        type: choice
        options:
          - hollywood
          - bollywood
          - both

jobs:
  post-movies:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bollywood session (BD 11:05 AM)
        if: >
          github.event.schedule == '5 5 * * *' ||
          (github.event_name == 'workflow_dispatch' &&
           (github.event.inputs.session == 'bollywood' ||
            github.event.inputs.session == 'both'))
        run: |
          python - << 'EOF'
          import asyncio, sys
          sys.path.insert(0, '.')
          from zyflix_bot import run_session
          asyncio.run(run_session("hi", "bollywood"))
          EOF
        timeout-minutes: 40

      - name: Run Hollywood session (BD 6:30 PM)
        if: >
          github.event.schedule == '30 12 * * *' ||
          (github.event_name == 'workflow_dispatch' &&
           (github.event.inputs.session == 'hollywood' ||
            github.event.inputs.session == 'both'))
        run: |
          python - << 'EOF'
          import asyncio, sys
          sys.path.insert(0, '.')
          from zyflix_bot import run_session
          asyncio.run(run_session("en", "hollywood"))
          EOF
        timeout-minutes: 40

      - name: Commit posted_movies.json to repo
        if: always()
        run: |
          git config user.name  "ZyFlix Bot"
          git config user.email "bot@zyflix.tech"
          git add posted_movies.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Update posted history [skip ci]"
            git push
            echo "posted_movies.json saved."
          fi
