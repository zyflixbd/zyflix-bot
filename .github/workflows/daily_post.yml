name: ZyFlix Daily Movie Post

on:
  # ─── BD Time → UTC conversion ─────────────────────────
  # Bollywood  → BD সকাল ১০:০০  = UTC 04:00
  # Hollywood  → BD সন্ধ্যা ৬:৩০ = UTC 12:30
  # ──────────────────────────────────────────────────────
  schedule:
    - cron: '0 4 * * *'     # Bollywood session  (BD 10:00 AM)
    - cron: '30 12 * * *'   # Hollywood session  (BD  6:30 PM)
  workflow_dispatch:
    inputs:
      session:
        description: 'Which session to run?'
        required: true
        default: 'both'
        type: choice
        options:
          - hollywood
          - bollywood
          - both

jobs:
  post-movies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted history
        uses: actions/cache@v3
        with:
          path: posted_movies.json
          key: posted-${{ github.run_number }}
          restore-keys: posted-

      # ── Bollywood → BD সকাল ১০:০০ (UTC 04:00) ─────────
      - name: Run Bollywood session (UTC 04:00 = BD 10:00 AM)
        if: >
          github.event.schedule == '0 4 * * *' ||
          (github.event_name == 'workflow_dispatch' &&
           (github.event.inputs.session == 'bollywood' ||
            github.event.inputs.session == 'both'))
        run: |
          python - << 'EOF'
          import asyncio, sys
          sys.path.insert(0, '.')
          from zyflix_bot import run_session
          asyncio.run(run_session("hi", "bollywood"))
          EOF
        timeout-minutes: 40

      # ── Hollywood → BD সন্ধ্যা ৬:৩০ (UTC 12:30) ───────
      - name: Run Hollywood session (UTC 12:30 = BD 6:30 PM)
        if: >
          github.event.schedule == '30 12 * * *' ||
          (github.event_name == 'workflow_dispatch' &&
           (github.event.inputs.session == 'hollywood' ||
            github.event.inputs.session == 'both'))
        run: |
          python - << 'EOF'
          import asyncio, sys
          sys.path.insert(0, '.')
          from zyflix_bot import run_session
          asyncio.run(run_session("en", "hollywood"))
          EOF
        timeout-minutes: 40

      - name: Save posted history
        if: always()
        uses: actions/cache@v3
        with:
          path: posted_movies.json
          key: posted-${{ github.run_number }}
